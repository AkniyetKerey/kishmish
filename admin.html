<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kish-Mish — Админка меню</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=4">
    <link rel="stylesheet" href="css/admin.css?v=4">
</head>
<body>
    <div class="admin-page">
        <div class="admin-header">
            <h1>🛠️ Kish-Mish — Админка меню</h1>
            <div style="display:flex; gap:14px; align-items:center;">
                <a href="#" id="admin-logout-link" onclick="handleAdminLogout(); return false;" class="hidden">Выйти</a>
                <a href="index.html">← На сайт</a>
            </div>
        </div>

        <!-- Экран входа: показывается, пока не пройдёт настоящая проверка через
             Supabase Auth (сервер сам сверяет пароль — в отличие от пароля,
             зашитого прямо в JS-файл, этот нельзя подсмотреть в исходном коде) -->
        <div id="admin-login-screen" class="admin-login-screen hidden">
            <h2>🔒 Вход в админку</h2>
            <input type="email" id="admin-email" class="form-control" placeholder="Email" autocomplete="username">
            <input type="password" id="admin-password" class="form-control" placeholder="Пароль" autocomplete="current-password">
            <button class="admin-add-btn admin-add-category-btn" onclick="handleAdminLogin()">Войти</button>
            <p id="admin-login-error" class="admin-login-error"></p>
        </div>

        <div id="admin-root" class="hidden">Загрузка…</div>
    </div>

    <!-- Порядок важен: config -> данные меню (заглушка) -> сервисный слой api -> admin -->
    <!-- ?v=4 у каждого файла — защита от кэша браузера. При следующем обновлении
         кода просто увеличь цифру у ВСЕХ файлов разом (например на v=5) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=4"></script>
    <script src="data.js?v=4"></script>
    <script src="js/api.js?v=4"></script>
    <script src="js/admin.js?v=4"></script>
</body>
</html>
